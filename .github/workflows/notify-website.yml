name: Notify website repo

on:
  push:
    branches: ["main"]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        env:
          GH_PAT: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_PAT}" \
            https://api.github.com/repos/p4sttt/notes/dispatches \
            -d '{"event_type":"notes-updated","client_payload":{"notes_repo":"p4sttt/notes-Deep-Learning","notes_ref":"main"}}'

